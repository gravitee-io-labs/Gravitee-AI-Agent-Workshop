<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gravitee AI Agent Inspector</title>
  <link rel="icon" href="assets/gravitee-mark.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <img class="logo" src="assets/gravitee-logo.svg" alt="Gravitee" height="22"/>
      <div class="header-sep"></div>
      <h1>AI Agent Inspector</h1>
    </div>

    <div class="header-right">
      <span class="mode-dot" id="wsIndicator"></span>
      <div class="live-stats">
        <span class="stat-label">Events</span>
        <span class="stat-value" id="eventCount">0</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Lane headers -->
    <div class="lane-headers">
      <div class="lane-header" data-lane="client">
        <div class="lane-icon icon-client">
          <i class="ph ph-app-window" style="font-size:24px"></i>
        </div>
        <span class="lane-name">Client</span>
        <span class="lane-sub">Request the Agent</span>
      </div>
      <div class="lane-header" data-lane="agent">
        <div class="lane-icon icon-agent">
          <i class="ph ph-robot" style="font-size:24px"></i>
        </div>
        <span class="lane-name">AI Agent</span>
        <span class="lane-sub">Orchestrate</span>
      </div>
      <div class="lane-header" data-lane="gateway">
        <div class="lane-icon icon-gateway">
          <img src="assets/gravitee-mark.svg" alt="Gravitee" width="26" height="26"/>
        </div>
        <span class="lane-name">Gravitee Gateway</span>
        <span class="lane-sub">API, AI Management &amp; MCP Server</span>
      </div>
      <div class="lane-header" data-lane="llm">
        <div class="lane-icon icon-llm">
          <i class="ph ph-brain" style="font-size:24px"></i>
        </div>
        <span class="lane-name">LLM</span>
        <span class="lane-sub">Think &amp; Decide</span>
      </div>
      <div class="lane-header" data-lane="api">
        <div class="lane-icon icon-api">
          <i class="ph ph-code" style="font-size:24px"></i>
        </div>
        <span class="lane-name">API</span>
        <span class="lane-sub">REST Backend</span>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar">
      <div class="filter-group">
        <i class="ph ph-funnel" style="font-size:14px;color:var(--text-3)"></i>
        <button class="filter-pill active" data-tag="all">All</button>
      </div>
    </div>

    <!-- Graph area -->
    <div class="graph-area" id="graphArea">
      <div class="steps" id="stepsContainer"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <button class="ctrl-btn" id="btnClear" title="Clear events">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1m2 0v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="live-indicator">
      <span class="live-pulse" id="livePulse"></span>
      <span class="live-label" id="liveLabel">Waiting for gateway events...</span>
    </div>
  </footer>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Event Details</h3>
        <button class="modal-close" id="modalClose">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
