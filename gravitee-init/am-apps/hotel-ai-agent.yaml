# Hotels AI Agent — Token Exchange (RFC 8693)
name: "Hotels AI Agent"
description: "Hotels AI Agent App"
type: "SERVICE"

clientId: "hotel-ai-agent"
clientSecret: "hotel-ai-agent"

oauth:
  grantTypes:
    - "urn:ietf:params:oauth:grant-type:token-exchange"
    - "client_credentials"
  tokenEndpointAuthMethod: "client_secret_basic"
  pkce: false
  tokenExchange:
    inherited: true
    scopeHandling: "downscoping"
  tokenValidity:
    accessToken: 7200
    refreshToken: 14400
    idToken: 14400
  tokenCustomClaims:
    - tokenType: "access_token"
      claimName: "email"
      claimValue: "{#context.attributes['user']['username']}"